<script>
    (function() {
        var searchInput = document.getElementById('global-search');
        var cards = document.querySelectorAll('.compact-card');
        var filterPills = document.querySelectorAll('.filter-pill');
        var activeFilter = 'all';

        function cardMatchesFilter(card) {
            if (activeFilter === 'all') return true;
            var category = card.getAttribute('data-category') || '';
            return category.indexOf(activeFilter) !== -1;
        }

        function cardMatchesSearch(card, term) {
            if (!term) return true;
            var haystack = card.getAttribute('data-search') || card.textContent || '';
            return haystack.toLowerCase().indexOf(term) !== -1;
        }

        function applyFilters() {
            var term = searchInput ? searchInput.value.toLowerCase().trim() : '';
            cards.forEach(function(card) {
                var matches = cardMatchesFilter(card) && cardMatchesSearch(card, term);
                if (matches) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        filterPills.forEach(function(pill) {
            pill.addEventListener('click', function() {
                filterPills.forEach(function(other) {
                    other.classList.remove('bg-olive-700', 'text-olive-50');
                    if (!other.classList.contains('bg-white')) {
                        other.classList.add('bg-white');
                    }
                    if (!other.classList.contains('border')) {
                        other.classList.add('border', 'border-olive-200');
                    }
                    other.classList.add('text-olive-700');
                });

                pill.classList.add('bg-olive-700', 'text-olive-50');
                pill.classList.remove('bg-white', 'text-olive-700');

                activeFilter = pill.getAttribute('data-filter') || 'all';
                applyFilters();
            });
        });

        if (searchInput) {
            searchInput.addEventListener('input', applyFilters);
            document.addEventListener('keydown', function(event) {
                if ((event.metaKey || event.ctrlKey) && event.key === 'k') {
                    event.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                if (event.key === 'Escape') {
                    searchInput.blur();
                }
            });
        }
    })();
</script>
